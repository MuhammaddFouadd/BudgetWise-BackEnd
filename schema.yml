openapi: 3.0.3
info:
  title: BudgetWise Financial Engine API
  version: 1.0.0
  description: Enterprise-grade API infrastructure for personal finance management,
    featuring intelligent transaction tracking, dynamic budgeting, and secure session-based
    authentication.
  contact:
    name: BudgetWise Engineering Team
    url: https://github.com/MuhammaddFouadd/BudgetWise-BackEnd
  license:
    name: MIT License
paths:
  /analytics/budget-alert/:
    get:
      operationId: analytics_budget_alert_list
      description: List all budget category limits for the authenticated user's current
        month.
      summary: Current Budget Status Alerts
      tags:
      - analytics
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BudgetAlert'
          description: ''
  /analytics/dashboard-summary/:
    get:
      operationId: analytics_dashboard_summary_retrieve
      description: 'Return high-level dashboard data: balance, income, expenses, recent
        activity.'
      summary: Dashboard Summary
      tags:
      - analytics
      security:
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
          description: ''
  /analytics/reports/:
    get:
      operationId: get_reports_analytics
      description: Return category spending breakdown and income vs expense totals.
      summary: Spending Analytics Reports
      tags:
      - analytics
      security:
      - tokenAuth: []
      responses:
        '200':
          description: No response body
