components:
  schemas:
    Budget:
      type: object
      description: Serializer for monthly budgets, including computed spent and remaining
        fields.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        month:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        total_limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        remaining:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BudgetStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - month
      - name
      - remaining
      - spent
      - status
      - total_limit
      - updated_at
      - year
    BudgetAlert:
      type: object
      description: Serializer for budget category limit alerts with computed progress
        and status color.
      properties:
        category_name:
          type: string
          readOnly: true
        limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        progress_percentage:
          type: string
          readOnly: true
        status_color:
          type: string
          readOnly: true
        alert_message:
          type: string
          readOnly: true
      required:
      - alert_message
      - category_name
      - limit
      - progress_percentage
      - status_color
    BudgetCategoryLimit:
      type: object
      description: Serializer for per-category spending limits within a budget.
      properties:
        id:
          type: integer
          readOnly: true
        budget:
          type: integer
        category:
          type: integer
        category_name:
          type: string
          readOnly: true
        limit:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
        spent:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        remaining:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/BudgetCategoryLimitStatusEnum'
          readOnly: true
      required:
      - budget
      - category
      - category_name
      - id
      - limit
      - remaining
      - spent
      - status
    BudgetCategoryLimitStatusEnum:
      enum:
      - active
      - close
      - exceeded
      type: string
      description: |-
        * `active` - Active
        * `close` - Close
        * `exceeded` - Exceeded
    BudgetStatusEnum:
      enum:
      - active
      - exceeded
      - completed
      type: string
      description: |-
        * `active` - Active
        * `exceeded` - Exceeded
        * `completed` - Completed
    Category:
      type: object
      description: Serializer for expense/income categories.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/Type005Enum'
        parent:
          type: integer
          nullable: true
        is_predefined:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - is_predefined
      - name
      - type
    ContributeRequest:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,12}(?:\.\d{0,2})?$
      required:
      - amount
    DashboardSummary:
      type: object
      description: Serializer for the dashboard home page summary.
      properties:
        total_balance:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        monthly_income:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        monthly_expenses:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        recent_transactions:
          type: string
          readOnly: true
        budget_warnings:
          type: string
          readOnly: true
      required:
      - budget_warnings
      - monthly_expenses
      - monthly_income
      - recent_transactions
      - total_balance
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
