openapi: 3.0.3
info:
  title: BudgetWise API
  version: 1.0.0
  description: API for BudgetWise, a full-stack personal finance application.
paths:
  /analytics/budget-alert/:
    get:
      operationId: analytics_budget_alert_list
      description: List all budget category limits for the authenticated user's current
        month.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BudgetAlert'
          description: ''
  /analytics/dashboard-summary/:
    get:
      operationId: analytics_dashboard_summary_retrieve
      description: Return dashboard summary data for the authenticated user.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'
          description: ''
  /analytics/reports/:
    get:
      operationId: get_reports_analytics
      description: |-
        Return category spending breakdown and income vs expense totals.

        Query parameters:
            start_date (str): Start of the date range (YYYY-MM-DD). Defaults to first of current month.
            end_date (str): End of the date range (YYYY-MM-DD). Defaults to today.
      tags:
      - analytics
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: No response body
  /api/analytics/budget-alert/:
